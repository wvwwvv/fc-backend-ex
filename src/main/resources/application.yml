spring:
  profiles:
    active: local

#  ./gradlew bootRun --args='--server.port=8081'
  datasource:
    url: jdbc:mysql://localhost:3306/fcraichu?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER_NAME:root}
    password: ${MYSQL_ROOT_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        show_sql: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # 인증 및 인가 서버 (OAuth2) 설정
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://fcraichu.inwoohub.com/auth/realms/fcraichu
#          issuer-uri: https://raichu.inwoohub.com/auth/realms/fcraichu
#          issuer-uri: http://localhost:8080/realms/fcraichu

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB


# 테스트용
server:
  address: 0.0.0.0
  port: 8080
  tomcat:
    max-swallow-size: -1 # 용량 초과되어도 네트워크 끊지 않고 정상적으로 에러 반환


logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
#    p6spy: INFO

# Swagger
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha


# 프론트에서 code + verifier 받아서 Keycloak 으로 넘길 때 필요한 정보 (랠름에 따라 설정해줘야함!)
keycloak:
  url: https://fcraichu.inwoohub.com/auth
  realm: fcraichu
  client-id: react
  client-secret: kAykNzrjgNyRR3tPtCoTmzthOAAGlQhh


frontend:
  redirect-uri: http://localhost:5173/callback


