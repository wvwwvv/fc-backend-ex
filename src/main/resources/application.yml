spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/fcraichu?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER_NAME:root}
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        show_sql: false

  # 나중에 redis 쓰는거 대비
  #data:
  #redis:
  #host: ${SPRING_DATA_REDIS_HOST:localhost}
  #port: ${SPRING_DATA_REDIS_PORT:6380}

jwt:
  header: Authorization
  secret: 90a95d35-051f-4ec2-9a42-eb1b2870608e
  token-validity-in-seconds: 86400


# 테스트용
server:
  address: 0.0.0.0
  port: 8080


logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
#    p6spy: INFO