spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/fcraichu?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
