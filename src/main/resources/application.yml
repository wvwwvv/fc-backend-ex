spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/fcraichu?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        show_sql: false

  # 나중에 redis 쓰는거 대비
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

# 시크릿 키는 : https://jwtsecretkeygenerator.com/ko/ 여기서 만듦
jwt:
  secret: CD9KEjLo1DkQB6EMWo8RZPl2i8XAxv4RLVNAC3dmdVf
  access-token:
    expire-time: 1800000
  refresh-token:
    expire-time: 1209600000


# 테스트용
server:
  address: 0.0.0.0
  port: 8080


logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
