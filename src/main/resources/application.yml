      #data:
      #redis:
      #host: ${SPRING_DATA_REDIS_HOST:localhost}
      #port: ${SPRING_DATA_REDIS_PORT:6380}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
