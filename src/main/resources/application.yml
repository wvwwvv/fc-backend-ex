spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/fcraichu?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER_NAME:root}
    password: ${MYSQL_ROOT_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        show_sql: false
        #jdbc: # 한번 해보고 timezone 문제 해결되나 배포 후 확인해보기 # todo
          #time_zone: Asia/Seoul


  # 나중에 redis 쓰는거 대비
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

# 시크릿 키는 : https://jwtsecretkeygenerator.com/ko/ 여기서 만듦
jwt:
  secret: CD9KEjLo1DkQB6EMWo8RZPl2i8XAxv4RLVNAC3dmdVf
  access-token:
    expire-time: 3600000 # 1000 * 60 * 60 = 1시간
  refresh-token:
    expire-time: 604800000 # 1000 * 60 * 60 * 24 * 7 = 7일


# 테스트용
server:
  address: 0.0.0.0
  port: 8080


logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
#    p6spy: INFO

# Swagger
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha